    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f5f0e8;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh;
        }

        .hero {
            position: relative;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .hero-image {
            max-width: 52%;
            max-height: 52%;
            object-fit: contain;
            object-position: center;
            z-index: 1;
        }

        .signup-form {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            z-index: 2;
            margin-top: 1.5rem;
        }

        .signup-form input[type="email"] {
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            padding: 0.6rem 1rem;
            border: 1px solid #c0b8a8;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.6);
            color: #3d3d3d;
            outline: none;
            width: 220px;
            letter-spacing: 0.02em;
        }

        .signup-form input[type="email"]::placeholder {
            color: #9a9286;
        }

        .signup-form input[type="email"]:focus {
            border-color: #3d3d3d;
        }

        .signup-form button {
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 6px;
            background: #3d3d3d;
            color: #f5f0e8;
            cursor: pointer;
            letter-spacing: 0.02em;
            transition: background 0.2s ease;
        }

        .signup-form button:hover {
            background: #2a2a2a;
        }

        .location-label {
            display: flex;
            align-items: center;
            font-size: 0.9rem;
            font-weight: 500;
            color: #3d3d3d;
            letter-spacing: 0.02em;
            gap: 0.5rem;
        }

        .footer-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            padding: 1.25rem 2rem;
            background: rgba(245, 240, 232, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 10;
        }

        .footer-bar a {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: #3d3d3d;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.02em;
            transition: color 0.2s ease;
        }

        .footer-bar a:hover {
            color: #e07070;
        }

        .footer-bar svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        .separator {
            width: 1px;
            height: 18px;
            background: #c0b8a8;
        }

        .email-text {
            color: #3d3d3d;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.02em;
        }

        @media (max-width: 600px) {
            .hero-image {
                max-width: 75%;
                max-height: 45%;
            }

            .signup-form input[type="email"] {
                width: 180px;
                font-size: 0.8rem;
            }

            .signup-form button {
                font-size: 0.8rem;
            }

            .footer-bar {
                flex-direction: column;
                gap: 0.75rem;
                padding: 1rem 1.5rem;
            }

            .separator {
                display: none;
            }

            .footer-bar a,
            .email-text,
            .location-label {
                font-size: 0.82rem;
            }
        }

                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
